services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: faucet
      POSTGRES_USER: faucet
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U faucet"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://faucet:${POSTGRES_PASSWORD}@postgres:5432/faucet
      RPC_URL: ${RPC_URL}
      CHAIN_ID: ${CHAIN_ID}
      FAUCET_ADDRESS: ${FAUCET_ADDRESS}
      CHALLENGE_TTL_SECONDS: 300
      IP_HMAC_SECRET: ${IP_HMAC_SECRET}
      RATE_LIMIT_WINDOW_SECONDS: ${RATE_LIMIT_WINDOW_SECONDS:-600}
      RATE_LIMIT_MAX_CHALLENGE: ${RATE_LIMIT_MAX_CHALLENGE:-10}
      RATE_LIMIT_MAX_CLAIM: ${RATE_LIMIT_MAX_CLAIM:-5}
    networks:
      - internal
    # 외부 포트 노출 안 함 — nginx를 통해서만 접근

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://faucet:${POSTGRES_PASSWORD}@postgres:5432/faucet
      RPC_URL: ${RPC_URL}
      CHAIN_ID: ${CHAIN_ID}
      FAUCET_ADDRESS: ${FAUCET_ADDRESS}
      RELAYER_PRIVATE_KEY: ${RELAYER_PRIVATE_KEY}   # worker에만 주입
      WORKER_ID: worker-1
      CONFIRMATIONS_REQUIRED: ${CONFIRMATIONS_REQUIRED:-1}
      BROADCAST_TIMEOUT_SECONDS: ${BROADCAST_TIMEOUT_SECONDS:-120}
      POLL_INTERVAL_MS: ${POLL_INTERVAL_MS:-5000}
      LEASE_DURATION_SECONDS: ${LEASE_DURATION_SECONDS:-120}
    networks:
      - internal
    # 외부 포트 없음

  frontend:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.frontend
      args:
        NEXT_PUBLIC_CHAIN_ID: ${CHAIN_ID}
        NEXT_PUBLIC_FAUCET_ADDRESS: ${FAUCET_ADDRESS}
        NEXT_PUBLIC_API_BASE_URL: /api/v1
        NEXT_PUBLIC_RPC_EXPLORER_BASE_URL: ${NEXT_PUBLIC_RPC_EXPLORER_BASE_URL:-}
        NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ${WALLETCONNECT_PROJECT_ID:-}
        NEXT_PUBLIC_RPC_URL: ${NEXT_PUBLIC_RPC_URL:-}
        NEXT_PUBLIC_TOKEN_SYMBOL: ${NEXT_PUBLIC_TOKEN_SYMBOL:-TTK}
        NEXT_PUBLIC_IS_TESTNET: "${NEXT_PUBLIC_IS_TESTNET:?Required}"
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_CHAIN_ID: ${CHAIN_ID}
      NEXT_PUBLIC_FAUCET_ADDRESS: ${FAUCET_ADDRESS}
      NEXT_PUBLIC_API_BASE_URL: /api/v1
      NEXT_PUBLIC_RPC_EXPLORER_BASE_URL: ${NEXT_PUBLIC_RPC_EXPLORER_BASE_URL:-}
      NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ${WALLETCONNECT_PROJECT_ID:-}
    networks:
      - internal

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - api
      - frontend
    networks:
      - internal

volumes:
  postgres_data:

networks:
  internal:
    driver: bridge
