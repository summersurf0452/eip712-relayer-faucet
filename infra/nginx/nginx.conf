events {
  worker_connections 1024;
}

http {
  upstream api {
    server api:3001;
  }

  upstream frontend {
    server frontend:3000;
  }

  server_tokens off;
  proxy_hide_header X-Powered-By;
  proxy_hide_header Server;

  # ── Security headers (applied to all server blocks) ──
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  # ── HTTP → HTTPS redirect ──
  server {
    listen 80;
    server_name _;

    # 헬스체크는 HTTP에서도 허용 (LB/orchestrator용)
    location /healthz {
      proxy_pass http://api;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ── HTTPS server ──
  server {
    listen 443 ssl;
    server_name _;

    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; connect-src 'self' https://*.walletconnect.com wss://*.walletconnect.com https://*.walletconnect.org wss://*.walletconnect.org https://*.reown.com wss://*.reown.com https://*.infura.io; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: https://*.walletconnect.com https://*.reown.com; frame-ancestors 'none'; base-uri 'none'; object-src 'none'; form-action 'self';" always;

    # API 요청은 API 서버로
    location /api/ {
      proxy_pass http://api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 헬스체크
    location /healthz {
      proxy_pass http://api;
    }

    # 나머지는 프론트엔드로
    location / {
      proxy_pass http://frontend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }
  }
}
